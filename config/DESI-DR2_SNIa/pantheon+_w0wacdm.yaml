theory:
  camb:
    extra_args:
      dark_energy_model: ppf
      num_massive_neutrinos: 1
      nnu: 3.046 # Based on the unimpeded paper
likelihood:
  sn.pantheonplus: null
  bao.desi_dr2: null
params:
  logA:
    value: 3.045
    latex: \log(10^{10} A_\mathrm{s})
    drop: true
  As:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    latex: A_\mathrm{s}
  ns:
    value: 0.9649
    latex: n_\mathrm{s}
  H0:
    prior:
      min: 50
      max: 80
    latex: H_0
    ref: 68.0
    proposal: 1
  ombh2:
    prior:
      dist: norm
      loc: 0.02218
      scale: 0.00055
    proposal: 0.0005
    latex: \Omega_\mathrm{b} h^2
  omch2:
    prior:
      min: 0.01
      max: 0.16
    ref: 0.12
    proposal: 0.005
    latex: \Omega_\mathrm{c} h^2
  omegam:
    latex: \Omega_\mathrm{m}
  w:
    prior:
      min: -1.5
      max: -0.3
    ref: -1.0
    proposal: 0.1
    latex: w_0
  wa:
    prior:
      min: -2
      max: 2
    ref: 0.0
    proposal: 0.1
    latex: w_a
  w0_plus_wa:
    derived: 'lambda w, wa: w + wa'
    latex: w_0 + w_a
  mnu: 0.06
  omega_de:
    latex: \Omega_\Lambda
  YHe:
    latex: Y_\mathrm{P}
  Y_p:
    latex: Y_P^\mathrm{BBN}
  DHBBN:
    derived: 'lambda DH: 10**5*DH'
    latex: 10^5 \mathrm{D}/\mathrm{H}
  tau:
    value: 0.0544
    latex: \tau_\mathrm{reio}
  zrei:
    latex: z_\mathrm{re}

# Add this block at the root level (same indentation as theory/params/sampler)
prior:
  w0_wa_physical_boundary: "lambda w, wa: 0 if (w + wa) < 0 else -np.inf"
sampler:
  mcmc:
    proposal_scale: 1.9
    Rminus1_stop: 0.01
    Rminus1_cl_stop: 0.2
output: /scratch/tanveerk/bayesian-model-workspace/chains/mcmc/DESI-DR2_SN/pantheon+_w0wacdm/
