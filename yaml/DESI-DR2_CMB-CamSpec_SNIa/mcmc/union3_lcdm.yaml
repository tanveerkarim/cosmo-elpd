theory:
  camb:
    extra_args:
      num_massive_neutrinos: 1
      nnu: 3.046 # Based on the unimpeded paper 

      halofit_version: mead2016

      lens_potential_accuracy: 4
      lmax: 4000
      lens_margin: 1250

      AccuracyBoost: 1
      lAccuracyBoost: 1
      lSampleBoost: 1

likelihood:
  sn.union3: null
  bao.desi_dr2: null
  planck_2018_lowl.TT: null
  planck_2018_lowl.EE: null
  planck_2018_lensing.clik: null
  planck_2018_highl_CamSpec2021.TTTEEE: null
params:
  logA:
    prior: # Same as https://arxiv.org/pdf/2603.05472
      min: 2.9
      max: 3.13
    latex: \log(10^{10} A_\mathrm{s})
    drop: true
  As:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    latex: A_\mathrm{s}
  ns:
    prior:
      min: 0.94
      max: 1.
    latex: n_\mathrm{s}
  H0:
    prior:
      min: 60
      max: 80
    latex: H_0
  ombh2:
    prior:
      min: 0.02
      max: 0.03
    latex: \Omega_\mathrm{b} h^2
  omch2:
    prior:
      min: 0.10
      max: 0.13
    latex: \Omega_\mathrm{c} h^2
  w:
    prior:
      min: -1.11
      max: -0.57
    latex: w_0
  wa:
    prior:
      min: -1.57
      max: 0.46
    latex: w_a 
  w0_plus_wa:
    derived: 'lambda w, wa: w + wa'
    latex: w_0 + w_a
  omegam:
    latex: \Omega_\mathrm{m}
  omegamh2:
    derived: 'lambda omegam, H0: omegam*(H0/100)**2'
    latex: \Omega_\mathrm{m} h^2
  mnu: 0.06
  omega_de:
    latex: \Omega_\Lambda
  YHe:
    latex: Y_\mathrm{P}
  Y_p:
    latex: Y_P^\mathrm{BBN}
  DHBBN:
    derived: 'lambda DH: 10**5*DH'
    latex: 10^5 \mathrm{D}/\mathrm{H}
  tau:
    prior:
      min: 0.02
      max: 0.10
    latex: \tau_\mathrm{reio}
  zrei:
    latex: z_\mathrm{re}i

# Add this block at the root level (same indentation as theory/params/sampler)
prior:
  w0_wa_physical_boundary: "lambda w, wa: 0 if (w + wa) < 0 else -np.inf"

debug: false

sampler:
  mcmc:
    learn_proposal: True
    learn_proposal_Rminus1_max: 30.0
    proposal_scale: 1.5
    Rminus1_stop: 0.01
output: /scratch/tanveerk/DESI-DR2_SN-Pantheon+_CMB-CamSpecLensing/lcdm-smaller-union3-mcmc/
